[global]
summarize_threshold_lines = 50
head_lines = 30
tail_lines = 30
strip_ansi = true
normalize_whitespace = true
deduplicate_lines = true
git_log_limit = 25

[commands.git]
patterns = [
  { regex = "^(Counting|Compressing|Receiving|Resolving) objects:.*", action = "Remove" },
  { regex = "^remote: (Counting|Compressing|Enumerating).*", action = "Remove" },
]

[commands.cargo]
patterns = [
  { regex = "^\\s+Compiling \\S+ v[\\d.]+", action = "Collapse" },
  { regex = "^\\s+Downloaded \\S+ v[\\d.]+", action = "Remove" },
  { regex = "^error\\[E\\d+\\]", action = { TruncateLinesAt = 200 } },
]

[commands.npm]
patterns = [
  { regex = "^npm warn.*", action = "Remove" },
  { regex = "^added \\d+ packages.*", action = { ReplaceWith = "[npm install complete]" } },
  { regex = "^\\d+ packages are looking for funding.*", action = "Remove" },
]

[commands.docker]
patterns = [
  { regex = "^ ---> [a-f0-9]+$", action = "Remove" },
  { regex = "^Removing intermediate container.*", action = "Remove" },
]

[commands.kubectl]
patterns = [
  { regex = "^[WIE]\\d{4}\\s+", action = "Remove" },
  { regex = "^Warning:.*deprecated.*", action = "Remove" },
  { regex = "^resource mapping not found.*", action = "Remove" },
]

[commands.terraform]
patterns = [
  { regex = "^\\s*Refreshing state\\.\\.\\.", action = "Collapse" },
  { regex = "^\\s*Reading\\.\\.\\.", action = "Collapse" },
  { regex = "^\\s*[╷╵│].*", action = "Remove" },
]

[commands.brew]
patterns = [
  { regex = "^==> Downloading https://", action = "Collapse" },
  { regex = "^==> Fetching dependencies", action = "Remove" },
  { regex = "^Already downloaded:", action = "Remove" },
]

[commands.go]
patterns = [
  { regex = "^go: downloading ", action = "Collapse" },
  { regex = "^go: finding module ", action = "Remove" },
  { regex = "^go: extracting ", action = "Remove" },
]

[commands.helm]
patterns = [
  { regex = "^coalesce\\.go:\\d+", action = "Remove" },
]

[commands.pip]
patterns = [
  { regex = "^Collecting \\S+", action = "Collapse" },
  { regex = "^  Downloading ", action = "Remove" },
  { regex = "^  Using cached ", action = "Remove" },
  { regex = "^Installing collected packages:", action = "Remove" },
]

[commands.make]
patterns = [
  { regex = "^make\\[\\d+\\]: Entering directory", action = "Remove" },
  { regex = "^make\\[\\d+\\]: Leaving directory", action = "Remove" },
  { regex = "^make\\[\\d+\\]: Nothing to be done", action = "Remove" },
]
on_empty = "(make: nothing to be done)"

[commands.tsc]
patterns = [
  { regex = "^TS\\d+: Build info file ", action = "Remove" },
]

[commands.gh]
patterns = [
  { regex = "^✓ ", action = "Remove" },
]

[tee]
enabled = true
mode = "aggressive"
max_files = 20

[commands.flutter]
patterns = [
  # dependency resolution noise
  { regex = "^Resolving dependencies\\.\\.\\.", action = "Remove" },
  { regex = "^Downloading packages\\.\\.\\.", action = "Remove" },
  { regex = "^  \\S+ \\d+\\.\\d+\\.\\d+ \\(\\d+\\.\\d+\\.\\d+ available\\)", action = "Collapse" },
  { regex = "^\\d+ packages have newer versions incompatible", action = "Remove" },
  { regex = "^Try `flutter pub outdated`", action = "Remove" },
  { regex = "^Changed \\d+ dependencies!", action = "Remove" },
  { regex = "^Got dependencies!", action = "Remove" },

  # upgrade banners
  { regex = "^[┌│└─┐┘╔╗╚╝║]", action = "Remove" },
  { regex = "^A new version of Flutter is available!", action = "Remove" },
  { regex = "^To update to the latest version, run", action = "Remove" },

  # build progress lines
  { regex = "^Running Gradle task", action = "Remove" },
  { regex = "^\\s*\\[\\s*\\+?\\d+\\s*ms\\]", action = "Remove" },
  { regex = "^Building with sound null safety", action = "Remove" },
  { regex = "^💪 Building with sound null safety", action = "Remove" },

  # xcode / ios build noise
  { regex = "^Xcode build done\\.", action = "Remove" },
  { regex = "^Building .* for .* device", action = "Remove" },
  { regex = "^Warning: Operand of null-aware operation", action = "Remove" },

  # analyze spinner / progress
  { regex = "^Analyzing \\S+\\.\\.\\.\\s*$", action = "Remove" },

  # pub get / upgrade download lines
  { regex = "^\\+ \\S+ \\d+\\.\\d+", action = "Collapse" },
  { regex = "^  \\S+ \\d+\\.\\d+\\.\\d+$", action = "Remove" },

  # gradle daemon / jvm noise
  { regex = "^Starting a Gradle Daemon", action = "Remove" },
  { regex = "^Daemon will be stopped", action = "Remove" },
  { regex = "^> Configure project", action = "Remove" },
  { regex = "^> Task :", action = "Collapse" },
  { regex = "^BUILD SUCCESSFUL in", action = "Remove" },

  # cocoapods noise
  { regex = "^Running pod install", action = "Remove" },
  { regex = "^CocoaPods' output:", action = "Remove" },
  { regex = "^    CDN: trunk", action = "Remove" },
  { regex = "^Analyzing dependencies", action = "Remove" },
  { regex = "^Downloading dependencies", action = "Remove" },
  { regex = "^Installing \\S+ \\(", action = "Collapse" },
  { regex = "^Generating Pods project", action = "Remove" },
  { regex = "^Integrating client project", action = "Remove" },
  { regex = "^Pod installation complete!", action = "Remove" },
]
