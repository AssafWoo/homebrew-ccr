name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ccr-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ccr

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ccr ${{ matrix.asset_name }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Compute source tarball SHA256
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/AssafWoo/homebrew-ccr/archive/refs/tags/${TAG}.tar.gz"
          # Retry up to 5 times — GitHub may take a moment to publish the tarball
          for i in $(seq 1 5); do
            SHA256=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
            [ -n "$SHA256" ] && break
            sleep 5
          done
          echo "RELEASE_SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Compute ORT SHA256s
        run: |
          ORT_VERSION="1.20.1"
          ARM64_SHA=$(curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" | sha256sum | awk '{print $1}')
          X86_SHA=$(curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-x86_64-${ORT_VERSION}.tgz" | sha256sum | awk '{print $1}')
          echo "ORT_ARM64_SHA=$ARM64_SHA" >> "$GITHUB_ENV"
          echo "ORT_X86_SHA=$X86_SHA" >> "$GITHUB_ENV"

      - name: Update formula
        run: |
          VERSION="${TAG#v}"
          sed -i \
            -e "s|/archive/refs/tags/v[0-9.]*\.tar\.gz|/archive/refs/tags/${TAG}.tar.gz|g" \
            -e "s|PLACEHOLDER_RELEASE_SHA256|${RELEASE_SHA256}|g" \
            -e "s|PLACEHOLDER_ORT_ARM64_SHA256|${ORT_ARM64_SHA}|g" \
            -e "s|PLACEHOLDER_ORT_X86_64_SHA256|${ORT_X86_SHA}|g" \
            Formula/ccr.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccr.rb
          git diff --cached --quiet && echo "No formula changes" && exit 0
          git commit -m "chore: update formula SHA256 for ${TAG}"
          git push origin HEAD:main
